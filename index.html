            --border-light: #bdd3eb;
            --card-bg: #ffffff;
            --navbar-bg: #002b7f;
            --navbar-text: #f0f6ff;
            --input-bg: #ffffff;

            --shadow-md: 0 16px 32px rgba(0, 30, 70, 0.12);
            --gradient-card: linear-gradient(145deg, #ffffff 0%, #f5f9ff 100%);
        }

        body.dark {
            --bg-primary: #0e121f;
            --bg-secondary: #1a1f30;
            --text-primary: #edf3ff;
            --text-secondary: #b6c8e3;
            --accent-blue: #4b8cff;
            --accent-red: #ff8a80;
            --accent-white: #242a3f;
            --border-light: #2f3b54;
            --card-bg: #1e263a;
            --navbar-bg: #0a0f1c;
            --navbar-text: #dde5f5;
            --input-bg: #232b40;
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.6);
            --shadow-md: 0 16px 32px rgba(0, 0, 0, 0.8);
            --gradient-card: linear-gradient(145deg, #1e263a, #1a2133);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 16px;
            min-height: 100vh;
        }

        .navbar {
            background: var(--navbar-bg);
            color: var(--navbar-text);
            padding: 0.8rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 5px solid var(--accent-red);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 1rem;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .logo span {
            background: var(--accent-red);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: white;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Панель действий (кнопки справа) */
        .nav-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            justify-content: flex-end;
        }

        .lang-btn, .theme-toggle {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .lang-btn:hover, .theme-toggle:hover {
            background: rgba(255,255,255,0.28);
            transform: translateY(-2px);
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 0.3rem 0.8rem 0.3rem 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .role-badge {
            background: var(--accent-red);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }
        .logout-btn:hover {
            background: white;
            color: var(--navbar-bg);
        }

        /* Меню вкладок */
        .tabs-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            background: var(--bg-secondary);
            padding: 0.7rem 2rem;
            border-bottom: 3px solid var(--accent-blue);
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.7rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: 40px 40px 0 0;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 4px solid transparent;
            transition: 0.15s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            border-bottom: 4px solid var(--accent-red);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(0, 57, 166, 0.15);
            color: var(--accent-blue);
        }

        /* Контент */
        .content {
            max-width: 1440px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .tab-pane {
            display: none;
            background: var(--gradient-card);
            padding: 2.5rem;
            border-radius: 48px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            animation: fade 0.3s;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0.3; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Формы и кнопки */
        input, textarea, select {
            padding: 1rem 1.6rem;
            border-radius: 28px;
            border: 2px solid var(--border-light);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            width: 100%;
            margin-bottom: 1.4rem;
            outline: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 5px rgba(0, 89, 255, 0.2);
        }

        button.primary, button.secondary {
            padding: 1rem 2.4rem;
            border-radius: 48px;
            font-weight: 700;
            font-size: 1.05rem;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            min-width: 180px;
            margin-right: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-sm);
        }

        button.primary {
            background: var(--accent-blue);
            color: white;
            background-image: linear-gradient(145deg, var(--accent-blue), #002b7f);
        }
        button.primary:hover {
            background: var(--accent-red);
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(213,43,30,0.4);
        }

        button.secondary {
            background: transparent;
            border: 3px solid var(--accent-blue);
            color: var(--accent-blue);
        }
        button.secondary:hover {
            background: var(--accent-blue);
            color: white;
            transform: translateY(-3px);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .card {
            background: var(--bg-secondary);
            padding: 1.8rem;
            border-radius: 32px;
            border-left: 8px solid var(--accent-red);
            box-shadow: var(--shadow-sm);
            transition: 0.25s;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
        }

            background: var(--bg-secondary);
            border-radius: 48px;
            padding: 1rem 2rem;
            margin: 1rem 0 1.8rem;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            border: 2px solid var(--accent-blue);
        }

            font-size: 2rem;
            font-weight: 800;
            background: var(--card-bg);
            padding: 0.3rem 2rem;
            border-radius: 60px;
            color: var(--accent-red);
        }

            flex: 1;
            min-width: 180px;
            margin-bottom: 0;

            }
            .nav-actions {
                justify-content: center;
            }
            .tabs-menu {
                padding: 0.5rem 1rem;
            }
            .content {
                padding: 0 1rem;
            }

            function generateCaptcha() {
                let a = Math.floor(Math.random() * 5) + 3;
                let b = Math.floor(Math.random() * 4) + 2;
                captchaAnswer = a + b;
                return `${a} + ${b}`;
            }

            function generateObserverLogin() {
                let maxNum = 0;
                STATE.observers.forEach(o => {
                    let m = o.login.match(/nabludatelid(\d+)/);
                    if (m) maxNum = Math.max(maxNum, +m[1]);
                });
                let newNum = maxNum + 1;
                return { login: `nabludatelid${newNum}`, password: `585858${newNum}` };
            }

            // Рендер вкладок
            function renderTabs() {
                const menu = document.getElementById('tabsMenu');
                let tabs = [];
                if (STATE.role === 'guest') tabs = ['about', 'blog', 'map', 'test', 'apply', 'contacts', 'login'];
                else if (STATE.role === 'observer') tabs = ['map', 'writePost', 'violation', 'sendReport', 'sendProtocol', 'identification'];
                else if (STATE.role === 'admin') tabs = ['about', 'blog', 'map', 'test', 'apply', 'contacts', 'admin', 'login'];

                menu.innerHTML = tabs.map(t => `<button class="tab-btn ${STATE.currentTab === t ? 'active' : ''}" data-tab="${t}">${t(t)}</button>`).join('');

                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        STATE.currentTab = btn.dataset.tab;
                        renderTabs();
                        renderContent();
                    });
                });

                document.getElementById('roleDisplay').innerText = 
                    STATE.role === 'admin' ? 'Администратор' : (STATE.role === 'observer' ? 'Наблюдатель' : 'Гость');
                document.getElementById('logoutBtn').style.display = STATE.role !== 'guest' ? 'inline-block' : 'none';
            }

            // Рендер контента (сокращён для экономии места, но функциональность сохранена)
            function renderContent() {
                const area = document.getElementById('contentArea');
                const tab = STATE.currentTab;
                let html = '<div class="tab-pane active">';

                if (tab === 'about') html += `<h2>${t('about')}</h2><p>${t('about_text')}</p>`;
                else if (tab === 'blog') {
                    let news = STATE.newsPosts.map(n => `<div class="card"><h3>${n.title}</h3><p>${n.content}</p></div>`).join('');
                    html += `<h2>${t('blog')}</h2><div class="card-grid">${news}</div>`;
                }
                else if (tab === 'map') html += `<h2>${t('map')}</h2><input placeholder="${t('search')}"><button class="primary">${t('search')}</button>`;
                else if (tab === 'test') html += `<h2>${t('test_header')}</h2>`;
                else if (tab === 'apply') html += `<h2>${t('apply_header')}</h2>`;
                else if (tab === 'contacts') html += `<h2>${t('contacts')}</h2><p>${t('contacts_text')}</p>`;
                else if (tab === 'login') {
                    let captchaExpr = generateCaptcha();
                    html += `<h2>${t('login_title')}</h2>
                        <input placeholder="${t('username')}" id="loginInput">
                        <input type="password" placeholder="${t('password')}" id="passwordInput">
                        <div class="captcha-block"><span class="captcha-question">${captchaExpr} = ?</span><input class="captcha-input" id="captchaInput" placeholder="${t('captcha_placeholder')}"></div>
                        <button class="primary" id="loginBtn">${t('enter')}</button>
                        <p id="loginMessage"></p>`;
                }
                else if (tab === 'writePost') html += `<h2>${t('post_header')}</h2>`;
                else if (tab === 'violation') html += `<h2>${t('viol_header')}</h2>`;
                else if (tab === 'sendReport') html += `<h2>${t('report_header')}</h2>`;
                else if (tab === 'sendProtocol') html += `<h2>${t('protocol_header')}</h2>`;
                else if (tab === 'identification') html += `<h2>${t('id_header')}</h2>`;
                else if (tab === 'admin') html += `<h2>${t('admin_header')}</h2><p>...</p>`;
                else html += '<p>Контент</p>';

                html += '</div>';
                area.innerHTML = html;
                attachSpecificListeners();
            }

            // Обработчики для логина и пр.
            function attachSpecificListeners() {
                const loginBtn = document.getElementById('loginBtn');
                if (loginBtn) {
                    loginBtn.addEventListener('click', () => {
                        let login = document.getElementById('loginInput')?.value;
                        let pass = document.getElementById('passwordInput')?.value;
                        let captchaUser = document.getElementById('captchaInput')?.value.trim();
                        if (parseInt(captchaUser) !== captchaAnswer) {
                            document.getElementById('loginMessage').innerText = t('wrong_captcha');
                            return;
                        }
                        if (login === STATE.admin.login && pass === STATE.admin.password) {
                            STATE.role = 'admin';
                            STATE.currentTab = 'about';
                        } else {
                            let obs = STATE.observers.find(o => o.login === login && o.password === pass);
                            if (obs) {
                                STATE.role = 'observer';
                                STATE.currentObserver = obs;
                                STATE.currentTab = 'map';
                            } else {
                                document.getElementById('loginMessage').innerText = 'Неверный логин/пароль';
                                return;
                            }
                        }
                        renderTabs();
                        renderContent();
                    });
                }
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    STATE.role = 'guest';
                    STATE.currentObserver = null;
                    STATE.currentTab = 'about';
                    renderTabs();
                    renderContent();
                });
            }

            document.getElementById('langRu').addEventListener('click', () => { currentLang = 'ru'; applyTranslations(); renderTabs(); renderContent(); });

            // Старт
            applyTranslations();
            renderTabs();
            renderContent();
        })();
